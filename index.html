<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Gun Arena - Neon Pop VR Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .neon-text-magenta { text-shadow: 0 0 10px #FF00FF, 0 0 20px #FF00FF; }
        .neon-text-cyan { text-shadow: 0 0 10px #00FFFF, 0 0 20px #00FFFF; }
        .neon-border-magenta { border-color: #FF00FF; box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }
        .neon-border-cyan { border-color: #00FFFF; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        
        /* Custom scrollbar for shop */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-root" class="fixed inset-0 pointer-events-none flex flex-col items-center justify-between p-8 z-10">
        <!-- Top Bar -->
        <div class="w-full flex justify-between items-start">
            <div class="bg-black/50 backdrop-blur-md p-4 rounded-xl border neon-border-magenta">
                <div class="text-[10px] uppercase tracking-[0.2em] text-[#FF00FF] mb-1 font-bold">Score</div>
                <div id="score-display" class="text-3xl font-black font-mono">0</div>
            </div>
            
            <div class="bg-black/50 backdrop-blur-md p-4 rounded-xl border neon-border-cyan text-right">
                <div class="text-[10px] uppercase tracking-[0.2em] text-[#00FFFF] mb-1 font-bold">Wave</div>
                <div id="wave-display" class="text-3xl font-black font-mono">0</div>
            </div>
        </div>

        <!-- Health Bar -->
        <div class="flex flex-col items-center gap-2 mb-8">
            <div class="w-64 h-3 bg-gray-900 rounded-full overflow-hidden border border-white/10">
                <div id="health-bar" class="h-full bg-gradient-to-r from-red-600 to-red-400 transition-all duration-300" style="width: 100%"></div>
            </div>
            <div class="text-[10px] uppercase tracking-widest text-white/50 font-bold">System Integrity</div>
        </div>

        <!-- Ammo HUD (Floating near hands conceptually, but fixed for screen preview) -->
        <div class="absolute bottom-12 left-12 flex flex-col gap-1">
            <div class="text-[10px] uppercase tracking-widest text-[#FF00FF] font-bold">Left Gun</div>
            <div id="ammo-left" class="text-2xl font-mono font-bold italic">12/12</div>
        </div>
        <div class="absolute bottom-12 right-12 flex flex-col gap-1 text-right">
            <div class="text-[10px] uppercase tracking-widest text-[#00FFFF] font-bold">Right Gun</div>
            <div id="ammo-right" class="text-2xl font-mono font-bold italic">12/12</div>
        </div>
    </div>

    <!-- Screens -->
    <div id="screen-start" class="fixed inset-0 flex items-center justify-center bg-black/90 z-20 transition-opacity duration-500">
        <div class="text-center space-y-8 max-w-lg px-6">
            <h1 class="text-7xl font-black italic uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-[#FF00FF] via-[#00FFFF] to-[#FFFF00]">
                Dual Gun Arena
            </h1>
            <p class="text-gray-400 text-xs uppercase tracking-[0.3em] leading-relaxed">
                360° Neon-Pop Combat Simulation<br>
                Aim with Mouse | Left/Right Click to Fire
            </p>
            <button id="btn-start" class="group relative px-12 py-5 bg-white text-black font-black uppercase tracking-[0.2em] hover:bg-[#FF00FF] hover:text-white transition-all duration-300 overflow-hidden">
                <span class="relative z-10">Enter Arena</span>
                <div class="absolute inset-0 bg-cyan translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
        </div>
    </div>

    <div id="screen-shop" class="fixed inset-0 flex items-center justify-center bg-black/95 z-30 hidden opacity-0 transition-opacity duration-500">
        <div class="bg-gray-900/50 border border-white/10 p-12 rounded-[2rem] backdrop-blur-3xl max-w-2xl w-full mx-4">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-4">
                    <h2 class="text-5xl font-black uppercase italic tracking-tighter text-cyan">Neon Shop</h2>
                </div>
                <div class="text-xs uppercase tracking-widest text-white/40">Wave Complete</div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="game.upgrade('damage')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#FFFF00] transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-[#FFFF00]">Damage Up</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">Increase energy output</div>
                </button>
                <button onclick="game.upgrade('fireRate')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#FF00FF] transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-[#FF00FF]">Fire Rate</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">Faster energy cycling</div>
                </button>
                <button onclick="game.upgrade('magSize')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#00FFFF] transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-[#00FFFF]">Mag Size</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">More shots per cell</div>
                </button>
                <button onclick="game.upgrade('heal')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-red-500 transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-red-500">Heal System</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">Restore 50% health</div>
                </button>
            </div>
        </div>
    </div>

    <div id="screen-gameover" class="fixed inset-0 flex flex-col items-center justify-center bg-red-950/95 z-40 hidden opacity-0 transition-opacity duration-500">
        <div class="text-center space-y-8">
            <h2 class="text-8xl font-black italic uppercase tracking-tighter text-white">
                Arena Terminated
            </h2>
            <div id="final-stats" class="text-2xl font-mono text-white/80 uppercase tracking-widest">
                Score: 0 | Wave: 0
            </div>
            <button onclick="location.reload()" class="px-12 py-5 bg-white text-black font-black uppercase tracking-[0.2em] hover:bg-black hover:text-white transition-all duration-300">
                Reboot System
            </button>
        </div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-0">
        <div class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center">
            <div class="w-1 h-1 bg-cyan rounded-full shadow-[0_0_10px_#00FFFF]"></div>
        </div>
    </div>
    <!-- Three.js and Game Logic -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        const COLORS = {
            MAGENTA: 0xFF00FF,
            CYAN: 0x00FFFF,
            BLACK: 0x050505,
            YELLOW: 0xFFFF00,
            RED: 0xFF4444,
            GREEN: 0x00FF00,
            GRID: 0x1a1a1a,
        };

        class DualGunArenaVR {
            constructor() {
                this.initEngine();
                this.initGameData();
                this.initVR();
                this.initArena();
                this.initUI3D();
                this.initAudio();
                this.animate();
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(COLORS.BLACK);

                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 1.6, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.xr.enabled = true;
                document.body.appendChild(this.renderer.domElement);
                document.body.appendChild(VRButton.createButton(this.renderer));

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                const sun = new THREE.DirectionalLight(0xffffff, 0.8);
                sun.position.set(5, 10, 5);
                this.scene.add(sun);
            }

            initVR() {
                this.controllers = [];
                const controllerModelFactory = new XRControllerModelFactory();

                for (let i = 0; i < 2; i++) {
                    const controller = this.renderer.xr.getController(i);
                    controller.addEventListener('selectstart', () => this.onTriggerDown(i));
                    this.scene.add(controller);
                    this.controllers.push(controller);

                    const grip = this.renderer.xr.getControllerGrip(i);
                    grip.add(controllerModelFactory.createControllerModel(grip));
                    this.scene.add(grip);

                    const gun = this.createGun(i === 0 ? COLORS.MAGENTA : COLORS.CYAN, i);
                    controller.add(gun.group);
                    if (i === 0) this.leftGun = gun; else this.rightGun = gun;

                    // Laser pointer for UI
                    const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)]);
                    const laser = new THREE.Line(laserGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
                    controller.add(laser);
                    controller.laser = laser;
                }
            }

            createGun(color, index) {
                const group = new THREE.Group();
                group.rotation.x = -Math.PI / 4;

                const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.2), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5 }));
                body.position.z = -0.05;
                group.add(body);

                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.1), body.material);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.z = -0.15;
                group.add(barrel);

                const hudCanvas = document.createElement('canvas');
                hudCanvas.width = 128; hudCanvas.height = 64;
                const texture = new THREE.CanvasTexture(hudCanvas);
                const hud = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 0.05), new THREE.MeshBasicMaterial({ map: texture, transparent: true }));
                hud.position.set(0, 0.06, -0.05);
                hud.rotation.x = -Math.PI / 2;
                group.add(hud);

                return { group, hudCtx: hudCanvas.getContext('2d'), hudTexture: texture, mat: body.material };
            }

            initUI3D() {
                this.uiPanel = new THREE.Group();
                this.uiPanel.position.set(0, 1.6, -2);
                this.scene.add(this.uiPanel);

                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                this.uiCtx = canvas.getContext('2d');
                this.uiTexture = new THREE.CanvasTexture(canvas);
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), new THREE.MeshBasicMaterial({ map: this.uiTexture, transparent: true }));
                this.uiPanel.add(mesh);
                this.updateUI3D();
            }

            updateUI3D() {
                const ctx = this.uiCtx;
                ctx.clearRect(0, 0, 512, 512);
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.roundRect(0, 0, 512, 512, 20);
                ctx.fill();
                ctx.strokeStyle = '#00FFFF';
                ctx.lineWidth = 5;
                ctx.stroke();

                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                
                if (this.state.isGameOver) {
                    ctx.font = 'bold 48px Inter';
                    ctx.fillText('ARENA TERMINATED', 256, 150);
                    ctx.font = '24px monospace';
                    ctx.fillText(`SCORE: ${this.state.score}`, 256, 250);
                    ctx.fillText('PULL TRIGGER TO REBOOT', 256, 400);
                } else if (this.state.isShopping) {
                    ctx.font = 'bold 48px Inter';
                    ctx.fillStyle = '#00FFFF';
                    ctx.fillText('NEON SHOP', 256, 100);
                    ctx.font = '20px Inter';
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillText('WAVE COMPLETE! UPGRADING...', 256, 200);
                    ctx.fillText('SYSTEMS CALIBRATING', 256, 300);
                } else if (!this.state.gameStarted) {
                    ctx.font = 'bold 48px Inter';
                    ctx.fillText('DUAL GUN ARENA', 256, 150);
                    ctx.font = '20px Inter';
                    ctx.fillText('PULL TRIGGER TO START', 256, 300);
                }
                this.uiTexture.needsUpdate = true;
            }

            initArena() {
                this.scene.add(new THREE.GridHelper(100, 50, COLORS.GRID, COLORS.GRID));
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: COLORS.BLACK }));
                floor.rotation.x = -Math.PI / 2;
                this.scene.add(floor);
                const starGeo = new THREE.BufferGeometry();
                const starPos = new Float32Array(5000 * 3);
                for (let i = 0; i < 15000; i++) starPos[i] = (Math.random() - 0.5) * 500;
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                this.scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));
            }

            initGameData() {
                this.state = { wave: 0, score: 0, health: 100, maxHealth: 100, isGameOver: false, isShopping: false, gameStarted: false, upgrades: { damage: 1, fireRate: 1, magSize: 12 } };
                this.ammo = [12, 12]; this.reloading = [false, false]; this.lastShotTime = [0, 0];
                this.enemies = []; this.bullets = []; this.particles = []; this.clock = new THREE.Clock();
            }

            initAudio() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    this.audioCtx = new AudioContext();
                }
            }

            playShootSound() {
                if (!this.audioCtx) return;
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                const t = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, t);
                osc.frequency.exponentialRampToValueAtTime(110, t + 0.1);
                
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);
                
                osc.start(t);
                osc.stop(t + 0.1);
            }

            playExplosionSound() {
                if (!this.audioCtx) return;
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                const bufferSize = this.audioCtx.sampleRate * 0.3;
                const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = this.audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = this.audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                filter.frequency.exponentialRampToValueAtTime(100, this.audioCtx.currentTime + 0.3);
                
                const gain = this.audioCtx.createGain();
                const t = this.audioCtx.currentTime;
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.audioCtx.destination);
                
                noise.start(t);
            }

            onTriggerDown(index) {
                if (this.state.isGameOver) { location.reload(); return; }
                if (!this.state.gameStarted) { this.state.gameStarted = true; this.uiPanel.visible = false; this.startWave(); return; }
                if (this.state.isShopping) return;
                this.shoot(index);
            }

            shoot(index) {
                if (this.reloading[index] || this.ammo[index] <= 0) return;
                const now = Date.now();
                if (now - this.lastShotTime[index] < 300 / this.state.upgrades.fireRate) return;
                this.lastShotTime[index] = now;
                this.ammo[index]--;
                this.updateGunHUD(index);
                this.playShootSound();
                const controller = this.controllers[index];
                const startPos = new THREE.Vector3();
                const direction = new THREE.Vector3(0, 0, -1);
                controller.getWorldPosition(startPos);
                direction.applyQuaternion(controller.getWorldQuaternion(new THREE.Quaternion()));
                this.spawnBullet(startPos, direction.multiplyScalar(0.8), true, 10 * this.state.upgrades.damage, index === 0 ? COLORS.MAGENTA : COLORS.CYAN);
                if (this.ammo[index] === 0) this.reload(index);
            }

            spawnBullet(pos, vel, isPlayer, damage, color) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color }));
                mesh.position.copy(pos);
                this.scene.add(mesh);
                this.bullets.push({ mesh, velocity: vel, isPlayer, damage });
            }

            reload(index) {
                this.reloading[index] = true;
                const gun = index === 0 ? this.leftGun : this.rightGun;
                gun.mat.color.setHex(COLORS.RED);
                setTimeout(() => {
                    this.ammo[index] = this.state.upgrades.magSize;
                    this.reloading[index] = false;
                    gun.mat.color.setHex(index === 0 ? COLORS.MAGENTA : COLORS.CYAN);
                    this.updateGunHUD(index);
                }, 1500);
            }

            updateGunHUD(index) {
                const gun = index === 0 ? this.leftGun : this.rightGun;
                const ctx = gun.hudCtx;
                ctx.clearRect(0, 0, 128, 64);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 128, 64);
                ctx.fillStyle = this.reloading[index] ? '#FF4444' : '#FFFFFF';
                ctx.font = 'bold 30px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.reloading[index] ? 'RELOAD' : `${this.ammo[index]}/${this.state.upgrades.magSize}`, 64, 42);
                gun.hudTexture.needsUpdate = true;
            }

            startWave() {
                this.state.wave++;
                this.state.isShopping = false;
                this.uiPanel.visible = false;
                const count = 5 + this.state.wave * 3;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 15 + Math.random() * 10;
                    this.spawnEnemy(angle, dist);
                }
            }

            spawnEnemy(angle, dist) {
                const type = ['popper', 'blaster', 'sentinel'][Math.floor(Math.random() * 3)];
                let geo, color, health = 10, speed = 0.04;
                if (type === 'popper') { geo = new THREE.BoxGeometry(0.5, 0.5, 0.5); color = COLORS.RED; speed = 0.06; }
                else if (type === 'blaster') { geo = new THREE.SphereGeometry(0.4, 8, 8); color = COLORS.CYAN; }
                else { geo = new THREE.ConeGeometry(0.4, 0.8, 8); color = COLORS.YELLOW; health = 30; speed = 0.02; }
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, wireframe: true, emissive: color, emissiveIntensity: 1 }));
                mesh.position.set(Math.cos(angle) * dist, 1.6, Math.sin(angle) * dist);
                this.scene.add(mesh);
                this.enemies.push({ mesh, type, health, speed, lastShot: 0, colorHex: color });
            }

            createExplosion(pos, color) {
                const particleCount = 15;
                const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const mat = new THREE.MeshBasicMaterial({ color });
                for (let i = 0; i < particleCount; i++) {
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(pos);
                    const velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.3,
                        (Math.random() - 0.5) * 0.3,
                        (Math.random() - 0.5) * 0.3
                    );
                    this.scene.add(mesh);
                    this.particles.push({ mesh, velocity, life: 1.0 });
                }
            }

            animate() {
                this.renderer.setAnimationLoop(() => {
                    this.updateGame();
                    this.renderer.render(this.scene, this.camera);
                });
            }

            updateGame() {
                if (this.state.isGameOver || this.state.isShopping || !this.state.gameStarted) return;
                const playerPos = new THREE.Vector3();
                this.camera.getWorldPosition(playerPos);

                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.mesh.position.add(b.velocity);
                    if (b.mesh.position.distanceTo(playerPos) > 50) { this.scene.remove(b.mesh); this.bullets.splice(i, 1); }
                    else if (!b.isPlayer && b.mesh.position.distanceTo(playerPos) < 0.5) { this.state.health -= b.damage; this.scene.remove(b.mesh); this.bullets.splice(i, 1); }
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.mesh.position.add(p.velocity);
                    p.life -= 0.03;
                    p.mesh.scale.setScalar(Math.max(0.01, p.life));
                    if (p.life <= 0) {
                        this.scene.remove(p.mesh);
                        this.particles.splice(i, 1);
                    }
                }

                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    const toPlayer = new THREE.Vector3().subVectors(playerPos, e.mesh.position).normalize();
                    const distToPlayer = e.mesh.position.distanceTo(playerPos);
                    const minDistance = 1.5; // Boundary to prevent overlap

                    if (e.type === 'popper') {
                        if (distToPlayer > minDistance) e.mesh.position.add(toPlayer.multiplyScalar(e.speed));
                    } else if (distToPlayer > 8) {
                        e.mesh.position.add(toPlayer.multiplyScalar(e.speed));
                    } else if (Date.now() - e.lastShot > 2000) {
                        e.lastShot = Date.now();
                        this.spawnBullet(e.mesh.position.clone(), toPlayer.clone().multiplyScalar(0.15), false, 10, COLORS.RED);
                    }
                    
                    for (let j = this.bullets.length - 1; j >= 0; j--) {
                        const b = this.bullets[j];
                        if (b.isPlayer && b.mesh.position.distanceTo(e.mesh.position) < 0.6) {
                            e.health -= b.damage; 
                            this.scene.remove(b.mesh); 
                            this.bullets.splice(j, 1);
                            
                            // Flash white when hit
                            e.mesh.material.emissive.setHex(0xffffff);
                            setTimeout(() => { if(e.mesh) e.mesh.material.emissive.setHex(e.colorHex); }, 100);

                            if (e.health <= 0) { 
                                this.state.score += 20; 
                                this.createExplosion(e.mesh.position, e.colorHex);
                                this.playExplosionSound();
                                this.scene.remove(e.mesh); 
                                this.enemies.splice(i, 1); 
                                break; 
                            }
                        }
                    }
                }

                if (this.enemies.length === 0 && this.state.wave > 0) {
                    this.state.isShopping = true;
                    this.uiPanel.visible = true;
                    this.updateUI3D();
                    setTimeout(() => {
                        this.state.upgrades.damage += 0.2;
                        this.state.upgrades.fireRate += 0.2;
                        this.startWave();
                    }, 4000);
                }

                if (this.state.health <= 0) {
                    this.state.isGameOver = true;
                    this.uiPanel.visible = true;
                    this.updateUI3D();
                }
            }
        }

        new DualGunArenaVR();
    </script>
</body>
</html>
