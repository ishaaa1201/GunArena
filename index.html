<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Gun Arena - Neon Pop VR Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .neon-text-magenta { text-shadow: 0 0 10px #FF00FF, 0 0 20px #FF00FF; }
        .neon-text-cyan { text-shadow: 0 0 10px #00FFFF, 0 0 20px #00FFFF; }
        .neon-border-magenta { border-color: #FF00FF; box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }
        .neon-border-cyan { border-color: #00FFFF; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        
        /* Custom scrollbar for shop */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-root" class="fixed inset-0 pointer-events-none flex flex-col items-center justify-between p-8 z-10">
        <!-- Top Bar -->
        <div class="w-full flex justify-between items-start">
            <div class="bg-black/50 backdrop-blur-md p-4 rounded-xl border neon-border-magenta">
                <div class="text-[10px] uppercase tracking-[0.2em] text-[#FF00FF] mb-1 font-bold">Score</div>
                <div id="score-display" class="text-3xl font-black font-mono">0</div>
            </div>
            
            <div class="bg-black/50 backdrop-blur-md p-4 rounded-xl border neon-border-cyan text-right">
                <div class="text-[10px] uppercase tracking-[0.2em] text-[#00FFFF] mb-1 font-bold">Wave</div>
                <div id="wave-display" class="text-3xl font-black font-mono">0</div>
            </div>
        </div>

        <!-- Health Bar -->
        <div class="flex flex-col items-center gap-2 mb-8">
            <div class="w-64 h-3 bg-gray-900 rounded-full overflow-hidden border border-white/10">
                <div id="health-bar" class="h-full bg-gradient-to-r from-red-600 to-red-400 transition-all duration-300" style="width: 100%"></div>
            </div>
            <div class="text-[10px] uppercase tracking-widest text-white/50 font-bold">System Integrity</div>
        </div>

        <!-- Ammo HUD (Floating near hands conceptually, but fixed for screen preview) -->
        <div class="absolute bottom-12 left-12 flex flex-col gap-1">
            <div class="text-[10px] uppercase tracking-widest text-[#FF00FF] font-bold">Left Gun</div>
            <div id="ammo-left" class="text-2xl font-mono font-bold italic">12/12</div>
        </div>
        <div class="absolute bottom-12 right-12 flex flex-col gap-1 text-right">
            <div class="text-[10px] uppercase tracking-widest text-[#00FFFF] font-bold">Right Gun</div>
            <div id="ammo-right" class="text-2xl font-mono font-bold italic">12/12</div>
        </div>
    </div>

    <!-- Screens -->
    <div id="screen-start" class="fixed inset-0 flex items-center justify-center bg-black/90 z-20 transition-opacity duration-500">
        <div class="text-center space-y-8 max-w-lg px-6">
            <h1 class="text-7xl font-black italic uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-[#FF00FF] via-[#00FFFF] to-[#FFFF00]">
                Dual Gun Arena
            </h1>
            <p class="text-gray-400 text-xs uppercase tracking-[0.3em] leading-relaxed">
                360° Neon-Pop Combat Simulation<br>
                Aim with Mouse | Left/Right Click to Fire
            </p>
            <button id="btn-start" class="group relative px-12 py-5 bg-white text-black font-black uppercase tracking-[0.2em] hover:bg-[#FF00FF] hover:text-white transition-all duration-300 overflow-hidden">
                <span class="relative z-10">Enter Arena</span>
                <div class="absolute inset-0 bg-cyan translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
        </div>
    </div>

    <div id="screen-shop" class="fixed inset-0 flex items-center justify-center bg-black/95 z-30 hidden opacity-0 transition-opacity duration-500">
        <div class="bg-gray-900/50 border border-white/10 p-12 rounded-[2rem] backdrop-blur-3xl max-w-2xl w-full mx-4">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-4">
                    <h2 class="text-5xl font-black uppercase italic tracking-tighter text-cyan">Neon Shop</h2>
                </div>
                <div class="text-xs uppercase tracking-widest text-white/40">Wave Complete</div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="game.upgrade('damage')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#FFFF00] transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-[#FFFF00]">Damage Up</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">Increase energy output</div>
                </button>
                <button onclick="game.upgrade('fireRate')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#FF00FF] transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-[#FF00FF]">Fire Rate</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">Faster energy cycling</div>
                </button>
                <button onclick="game.upgrade('magSize')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#00FFFF] transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-[#00FFFF]">Mag Size</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">More shots per cell</div>
                </button>
                <button onclick="game.upgrade('heal')" class="shop-item flex flex-col items-start p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-red-500 transition-all text-left group">
                    <div class="text-xl font-black uppercase italic tracking-tight mb-1 group-hover:text-red-500">Heal System</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest">Restore 50% health</div>
                </button>
            </div>
        </div>
    </div>

    <div id="screen-gameover" class="fixed inset-0 flex flex-col items-center justify-center bg-red-950/95 z-40 hidden opacity-0 transition-opacity duration-500">
        <div class="text-center space-y-8">
            <h2 class="text-8xl font-black italic uppercase tracking-tighter text-white">
                Arena Terminated
            </h2>
            <div id="final-stats" class="text-2xl font-mono text-white/80 uppercase tracking-widest">
                Score: 0 | Wave: 0
            </div>
            <button onclick="location.reload()" class="px-12 py-5 bg-white text-black font-black uppercase tracking-[0.2em] hover:bg-black hover:text-white transition-all duration-300">
                Reboot System
            </button>
        </div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-0">
        <div class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center">
            <div class="w-1 h-1 bg-cyan rounded-full shadow-[0_0_10px_#00FFFF]"></div>
        </div>
    </div>

    <!-- Three.js and Game Logic -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const COLORS = {
            MAGENTA: 0xFF00FF,
            CYAN: 0x00FFFF,
            BLACK: 0x050505,
            YELLOW: 0xFFFF00,
            RED: 0xFF4444,
            GREEN: 0x00FF00,
            GRID: 0x1a1a1a,
        };

        class DualGunArena {
            constructor() {
                this.initEngine();
                this.initGameData();
                this.initListeners();
                this.animate();
            }

            initEngine() {
                // Scene
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(COLORS.BLACK);

                // Camera
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 0, 0);

                // Renderer
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.toneMapping = THREE.ReinhardToneMapping;
                document.body.appendChild(this.renderer.domElement);

                // Controls
                this.controls = new PointerLockControls(this.camera, document.body);

                // Post-processing
                const renderScene = new RenderPass(this.scene, this.camera);
                const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
                bloomPass.threshold = 0.2;
                bloomPass.strength = 1.2;
                bloomPass.radius = 0.5;

                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(renderScene);
                this.composer.addPass(bloomPass);

                // Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
                this.scene.add(ambientLight);

                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(10, 10, 10);
                this.scene.add(pointLight);

                // Arena
                const grid = new THREE.GridHelper(100, 50, COLORS.GRID, COLORS.GRID);
                grid.position.y = -2;
                this.scene.add(grid);

                const floorGeo = new THREE.PlaneGeometry(100, 100);
                const floorMat = new THREE.MeshStandardMaterial({ color: COLORS.BLACK, roughness: 0.1, metalness: 0.8 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = -2.01;
                this.scene.add(floor);

                // Stars
                const starGeo = new THREE.BufferGeometry();
                const starCount = 5000;
                const starPos = new Float32Array(starCount * 3);
                for (let i = 0; i < starCount * 3; i++) {
                    starPos[i] = (Math.random() - 0.5) * 500;
                }
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
                const stars = new THREE.Points(starGeo, starMat);
                this.scene.add(stars);

                // Guns
                this.guns = {
                    left: this.createGun(COLORS.MAGENTA),
                    right: this.createGun(COLORS.CYAN)
                };
                this.scene.add(this.guns.left.group);
                this.scene.add(this.guns.right.group);
            }

            createGun(color) {
                const group = new THREE.Group();
                const bodyGeo = new THREE.BoxGeometry(0.1, 0.15, 0.4);
                const bodyMat = new THREE.MeshStandardMaterial({ 
                    color: color, 
                    emissive: color, 
                    emissiveIntensity: 0.5,
                    transparent: true,
                    opacity: 1
                });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                group.add(body);
                return { group, body, mat: bodyMat };
            }

            initGameData() {
                this.state = {
                    wave: 0,
                    score: 0,
                    health: 100,
                    maxHealth: 100,
                    isGameOver: false,
                    isShopping: false,
                    gameStarted: false,
                    upgrades: {
                        damage: 1,
                        fireRate: 1,
                        magSize: 12
                    }
                };

                this.ammo = { left: 12, right: 12 };
                this.reloading = { left: false, right: false };
                this.lastShotTime = { left: 0, right: 0 };
                
                this.enemies = [];
                this.bullets = [];
                this.clock = new THREE.Clock();
            }

            initListeners() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.composer.setSize(window.innerWidth, window.innerHeight);
                });

                document.getElementById('btn-start').addEventListener('click', () => {
                    this.controls.lock();
                });

                this.controls.addEventListener('lock', () => {
                    document.getElementById('screen-start').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('screen-start').style.display = 'none';
                        this.state.gameStarted = true;
                        if (this.state.wave === 0) this.startWave();
                    }, 500);
                });

                this.controls.addEventListener('unlock', () => {
                    if (!this.state.isGameOver && !this.state.isShopping) {
                        document.getElementById('screen-start').style.display = 'flex';
                        setTimeout(() => document.getElementById('screen-start').style.opacity = '1', 10);
                        this.state.gameStarted = false;
                    }
                });

                window.addEventListener('mousedown', (e) => {
                    if (!this.state.gameStarted || this.state.isShopping || this.state.isGameOver) return;
                    if (e.button === 0) this.shoot('left');
                    if (e.button === 2) this.shoot('right');
                });

                window.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            startWave() {
                this.state.wave++;
                this.state.isShopping = false;
                document.getElementById('screen-shop').style.opacity = '0';
                setTimeout(() => document.getElementById('screen-shop').style.display = 'none', 500);
                
                this.updateUI();

                const count = 5 + this.state.wave * 3;
                const types = ['popper', 'blaster', 'sentinel', 'jester'];
                
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 15 + Math.random() * 10;
                    const type = this.state.wave < 3 ? (Math.random() > 0.3 ? 'popper' : 'blaster') : 
                                 this.state.wave < 6 ? (Math.random() > 0.5 ? 'popper' : Math.random() > 0.5 ? 'blaster' : 'sentinel') :
                                 types[Math.floor(Math.random() * 4)];
                    
                    this.spawnEnemy(type, angle, dist);
                }
            }

            spawnEnemy(type, angle, dist) {
                let geometry, color;
                let health = 30;
                let speed = 0.05;

                switch(type) {
                    case 'popper':
                        geometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                        color = COLORS.RED;
                        speed = 0.06;
                        break;
                    case 'blaster':
                        geometry = new THREE.SphereGeometry(0.4, 8, 8);
                        color = COLORS.CYAN;
                        speed = 0.03;
                        break;
                    case 'sentinel':
                        geometry = new THREE.ConeGeometry(0.5, 1, 8);
                        color = COLORS.YELLOW;
                        health = 100;
                        speed = 0.02;
                        break;
                    case 'jester':
                        geometry = new THREE.IcosahedronGeometry(0.4, 0);
                        color = COLORS.GREEN;
                        speed = 0.04;
                        break;
                }

                const material = new THREE.MeshStandardMaterial({ 
                    color: color, 
                    wireframe: true, 
                    emissive: color, 
                    emissiveIntensity: 2 
                });
                const mesh = new THREE.Mesh(geometry, material);
                
                const x = Math.cos(angle) * dist;
                const z = Math.sin(angle) * dist;
                mesh.position.set(x, 0, z);
                
                this.scene.add(mesh);
                this.enemies.push({
                    id: Math.random().toString(36).substr(2, 9),
                    type,
                    mesh,
                    health,
                    maxHealth: health,
                    speed,
                    lastShot: 0
                });
            }

            shoot(side) {
                if (this.reloading[side] || this.ammo[side] <= 0) return;
                
                const now = Date.now();
                const fireDelay = 300 / this.state.upgrades.fireRate;
                if (now - this.lastShotTime[side] < fireDelay) return;

                this.lastShotTime[side] = now;
                this.ammo[side]--;
                this.updateUI();

                const direction = new THREE.Vector3(0, 0, -1);
                direction.applyQuaternion(this.camera.quaternion);
                
                const startPos = this.camera.position.clone();
                const offset = side === 'left' ? -0.4 : 0.4;
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(this.camera.quaternion);
                startPos.add(right.multiplyScalar(offset));

                this.spawnBullet(startPos, direction.multiplyScalar(0.8), true, 10 * this.state.upgrades.damage, side === 'left' ? COLORS.MAGENTA : COLORS.CYAN);

                if (this.ammo[side] === 0) this.reload(side);
            }

            spawnBullet(pos, vel, isPlayer, damage, color) {
                const geo = new THREE.SphereGeometry(0.05, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(pos);
                this.scene.add(mesh);
                this.bullets.push({ mesh, velocity: vel, isPlayer, damage });
            }

            reload(side) {
                this.reloading[side] = true;
                this.guns[side].mat.opacity = 0.5;
                this.guns[side].mat.color.setHex(COLORS.RED);
                this.guns[side].mat.emissive.setHex(COLORS.RED);
                
                document.getElementById(`ammo-${side}`).innerText = 'RELOADING';
                document.getElementById(`ammo-${side}`).classList.add('text-red-500');

                setTimeout(() => {
                    this.ammo[side] = this.state.upgrades.magSize;
                    this.reloading[side] = false;
                    this.guns[side].mat.opacity = 1;
                    const color = side === 'left' ? COLORS.MAGENTA : COLORS.CYAN;
                    this.guns[side].mat.color.setHex(color);
                    this.guns[side].mat.emissive.setHex(color);
                    document.getElementById(`ammo-${side}`).classList.remove('text-red-500');
                    this.updateUI();
                }, 1500);
            }

            upgrade(type) {
                if (type === 'heal') {
                    this.state.health = Math.min(this.state.maxHealth, this.state.health + 50);
                } else {
                    this.state.upgrades[type] += (type === 'magSize' ? 4 : 0.2);
                }
                this.startWave();
            }

            updateUI() {
                document.getElementById('score-display').innerText = this.state.score.toLocaleString();
                document.getElementById('wave-display').innerText = this.state.wave;
                document.getElementById('health-bar').style.width = `${(this.state.health / this.state.maxHealth) * 100}%`;
                
                if (!this.reloading.left) document.getElementById('ammo-left').innerText = `${this.ammo.left}/${this.state.upgrades.magSize}`;
                if (!this.reloading.right) document.getElementById('ammo-right').innerText = `${this.ammo.right}/${this.state.upgrades.magSize}`;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                
                const delta = this.clock.getDelta();
                
                if (this.state.gameStarted && !this.state.isGameOver && !this.state.isShopping) {
                    this.updateGuns();
                    this.updateBullets();
                    this.updateEnemies();
                }

                this.composer.render();
            }

            updateGuns() {
                const time = Date.now() * 0.002;
                ['left', 'right'].forEach(side => {
                    const gun = this.guns[side].group;
                    const offset = side === 'left' ? -0.4 : 0.4;
                    const targetPos = new THREE.Vector3(offset, -0.3, -0.6);
                    targetPos.applyQuaternion(this.camera.quaternion);
                    targetPos.add(this.camera.position);
                    
                    gun.position.lerp(targetPos, 0.2);
                    gun.quaternion.slerp(this.camera.quaternion, 0.2);
                    gun.position.y += Math.sin(time) * 0.005;
                });
            }

            updateBullets() {
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.mesh.position.add(b.velocity);
                    
                    if (b.mesh.position.length() > 100) {
                        this.scene.remove(b.mesh);
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // Player hit
                    if (!b.isPlayer && b.mesh.position.distanceTo(this.camera.position) < 1) {
                        this.takeDamage(b.damage);
                        this.scene.remove(b.mesh);
                        this.bullets.splice(i, 1);
                    }
                }
            }

            updateEnemies() {
                const playerPos = this.camera.position;
                
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    const toPlayer = new THREE.Vector3().subVectors(playerPos, e.mesh.position).normalize();
                    
                    // Movement
                    if (e.type === 'popper') {
                        e.mesh.position.add(toPlayer.multiplyScalar(e.speed));
                    } else if (e.type === 'blaster' || e.type === 'sentinel') {
                        const dist = e.mesh.position.distanceTo(playerPos);
                        if (dist > 10) {
                            e.mesh.position.add(toPlayer.multiplyScalar(e.speed));
                        }
                        
                        // Shoot
                        const now = Date.now();
                        if (now - e.lastShot > (e.type === 'sentinel' ? 3000 : 2000)) {
                            e.lastShot = now;
                            this.spawnBullet(e.mesh.position.clone(), toPlayer.clone().multiplyScalar(0.2), false, 10, COLORS.RED);
                        }
                    }

                    // Collisions with bullets
                    for (let j = this.bullets.length - 1; j >= 0; j--) {
                        const b = this.bullets[j];
                        if (b.isPlayer && b.mesh.position.distanceTo(e.mesh.position) < 0.8) {
                            e.health -= b.damage;
                            this.scene.remove(b.mesh);
                            this.bullets.splice(j, 1);
                            
                            if (e.health <= 0) {
                                this.state.score += (e.type === 'sentinel' ? 50 : 20);
                                this.scene.remove(e.mesh);
                                this.enemies.splice(i, 1);
                                this.updateUI();
                                break;
                            }
                        }
                    }

                    // Melee hit
                    if (e.mesh.position.distanceTo(playerPos) < 1.5) {
                        this.takeDamage(0.5);
                    }
                }

                if (this.enemies.length === 0 && this.state.gameStarted) {
                    this.openShop();
                }
            }

            takeDamage(amount) {
                this.state.health = Math.max(0, this.state.health - amount);
                this.updateUI();
                if (this.state.health <= 0) this.gameOver();
            }

            openShop() {
                this.state.isShopping = true;
                this.controls.unlock();
                document.getElementById('screen-shop').style.display = 'flex';
                setTimeout(() => document.getElementById('screen-shop').style.opacity = '1', 10);
            }

            gameOver() {
                this.state.isGameOver = true;
                this.controls.unlock();
                document.getElementById('final-stats').innerText = `Score: ${this.state.score.toLocaleString()} | Wave: ${this.state.wave}`;
                document.getElementById('screen-gameover').style.display = 'flex';
                setTimeout(() => document.getElementById('screen-gameover').style.opacity = '1', 10);
            }
        }

        // Global game instance
        window.game = new DualGunArena();

    </script>
</body>
</html>
